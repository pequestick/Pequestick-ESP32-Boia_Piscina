name: Build firmware

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'firmware/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Read firmware version
        shell: bash
        run: |
          VERSION=$(grep -oE 'FIRMWARE_VERSION[[:space:]]*=[[:space:]]*"[^"]+"' src/AppConfig.cpp | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VERSION" ]; then
            echo "No s'ha pogut llegir FIRMWARE_VERSION de src/AppConfig.cpp"
            exit 1
          fi
          echo "FIRMWARE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Firmware version: $VERSION"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Build firmware
        env:
          GITHUB_SHA: ${{ github.sha }}
          BUILD_DATE: ${{ env.BUILD_DATE }}
        run: pio run -e esp32-c6-devkitc-1

      - name: Publish firmware files in repo
        run: |
          mkdir -p firmware
          cp .pio/build/esp32-c6-devkitc-1/firmware.bin firmware/firmware.bin
          SIZE=$(stat -c%s firmware/firmware.bin)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-12)
          cat > firmware/manifest.json <<JSON
          {
            "version": "${FIRMWARE_VERSION}",
            "build_sha": "${GITHUB_SHA}",
            "build_short_sha": "${SHORT_SHA}",
            "build_date": "${BUILD_DATE}",
            "size": ${SIZE},
            "firmware_url": "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/firmware/firmware.bin",
            "notes": "Build automatica de GitHub Actions"
          }
          JSON

      - name: Commit firmware artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add firmware/firmware.bin firmware/manifest.json
          if git diff --cached --quiet; then
            echo "No firmware changes to commit"
          else
            git commit -m "Update firmware artifacts [skip ci]"
            git push
          fi
